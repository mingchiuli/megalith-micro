name: GraalVM build User
on:
  push:
    branches:
      - 'main'
    paths:
      - 'micro-user/**'
      - 'build.gradle.kts'
      - 'common/**'
      - '.github/workflows/main-user.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: ./gradlew :micro-user:test
  build:
    name: Build
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'      # See 'Options' section below for all supported versions
          distribution: 'graalvm' # See 'Options' section below for all available distributions
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Print Info
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java --version
          native-image --version
      - name: Build
        run: ./gradlew :micro-user:bootBuildImage
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PWD: ${{ secrets.DOCKERHUB_PWD }}
  deploy:
    name: Deploy
    concurrency:
      group: megalith-production-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            docker pull mingchiuli/megalith-micro-user:latest
            docker compose rm -sf micro-user
            docker compose up -d --no-deps --force-recreate micro-user
            container_id=$(docker compose ps -q micro-user)
            if [ -z "$container_id" ]; then
              docker compose ps micro-user
              exit 1
            fi
            for attempt in $(seq 1 60); do
              health_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
              if [ "$health_status" = "healthy" ]; then
                break
              fi
              if [ "$health_status" = "unhealthy" ] || [ "$attempt" -eq 60 ]; then
                docker compose ps micro-user
                docker logs --tail=200 "$container_id"
                exit 1
              fi
              sleep 2
            done
            old=$(docker images | grep -w 'micro-user' | grep 'none' | awk '{print $3}')
            if [ -n "$old" ]; then
              docker rmi $old || true
            fi
