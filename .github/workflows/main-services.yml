name: Build and Deploy Services

on:
  push:
    branches:
      - 'main'
    paths:
      - 'micro-auth/**'
      - 'micro-blog/**'
      - 'micro-exhibit/**'
      - 'micro-search/**'
      - 'micro-user/**'
      - 'micro-gateway-rs/**'
      - 'micro-sync-rs/**'
      - 'common/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.dockerignore'
      - '.github/workflows/main-services.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Space-separated services to deploy, or all'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      java-services: ${{ steps.detect.outputs.java-services }}
      rust-services: ${{ steps.detect.outputs.rust-services }}
      deploy-services: ${{ steps.detect.outputs.deploy-services }}
      has-java: ${{ steps.detect.outputs.has-java }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
      has-services: ${{ steps.detect.outputs.has-services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        env:
          SERVICES_INPUT: ${{ github.event.inputs.services || 'all' }}
        run: |
          set -euo pipefail

          ORDER=(micro-user micro-auth micro-blog micro-search micro-exhibit micro-sync-rs micro-gateway-rs)
          JAVA_ORDER=(micro-user micro-auth micro-blog micro-search micro-exhibit)
          RUST_ORDER=(micro-sync-rs micro-gateway-rs)
          SELECTED=()

          has_service() {
            local target="$1"
            local service
            for service in "${SELECTED[@]}"; do
              if [ "$service" = "$target" ]; then
                return 0
              fi
            done
            return 1
          }

          add_service() {
            local service="$1"
            if ! has_service "$service"; then
              SELECTED+=("$service")
            fi
          }

          add_all_java() {
            local service
            for service in "${JAVA_ORDER[@]}"; do
              add_service "$service"
            done
          }

          add_all_rust() {
            local service
            for service in "${RUST_ORDER[@]}"; do
              add_service "$service"
            done
          }

          add_all() {
            add_all_java
            add_all_rust
          }

          add_requested_service() {
            case "$1" in
              all)
                add_all
                ;;
              micro-auth|micro-blog|micro-exhibit|micro-search|micro-user|micro-gateway-rs|micro-sync-rs)
                add_service "$1"
                ;;
              '')
                ;;
              *)
                echo "::error::Unknown service '$1'"
                exit 1
                ;;
            esac
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            for service in ${SERVICES_INPUT:-all}; do
              add_requested_service "$service"
            done
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES="$(git ls-tree -r --name-only "$AFTER")"
            else
              CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
            fi

            while IFS= read -r file; do
              case "$file" in
                micro-auth/*)
                  add_service micro-auth
                  ;;
                micro-blog/*)
                  add_service micro-blog
                  ;;
                micro-exhibit/*)
                  add_service micro-exhibit
                  ;;
                micro-search/*)
                  add_service micro-search
                  ;;
                micro-user/*)
                  add_service micro-user
                  ;;
                micro-gateway-rs/*)
                  add_service micro-gateway-rs
                  ;;
                micro-sync-rs/*)
                  add_service micro-sync-rs
                  ;;
                common/*|build.gradle.kts|settings.gradle.kts|gradle/*|gradlew|gradlew.bat)
                  add_all_java
                  ;;
                Cargo.toml|Cargo.lock|.dockerignore)
                  add_all_rust
                  ;;
              esac
            done <<< "$CHANGED_FILES"
          fi

          ordered_selected=()
          java_services=()
          rust_services=()
          service=""

          for service in "${ORDER[@]}"; do
            if has_service "$service"; then
              ordered_selected+=("$service")
            fi
          done

          for service in "${JAVA_ORDER[@]}"; do
            if has_service "$service"; then
              java_services+=("$service")
            fi
          done

          for service in "${RUST_ORDER[@]}"; do
            if has_service "$service"; then
              rust_services+=("$service")
            fi
          done

          json_array() {
            local first=1
            local item
            printf '['
            for item in "$@"; do
              if [ "$first" -eq 1 ]; then
                first=0
              else
                printf ','
              fi
              printf '"%s"' "$item"
            done
            printf ']'
          }

          java_json="$(json_array "${java_services[@]}")"
          rust_json="$(json_array "${rust_services[@]}")"
          deploy_services="${ordered_selected[*]}"

          {
            echo "java-services=$java_json"
            echo "rust-services=$rust_json"
            echo "deploy-services=$deploy_services"
            if [ "${#java_services[@]}" -gt 0 ]; then
              echo "has-java=true"
            else
              echo "has-java=false"
            fi
            if [ "${#rust_services[@]}" -gt 0 ]; then
              echo "has-rust=true"
            else
              echo "has-rust=false"
            fi
            if [ "${#ordered_selected[@]}" -gt 0 ]; then
              echo "has-services=true"
            else
              echo "has-services=false"
            fi
          } >> "$GITHUB_OUTPUT"

          echo "Selected services: ${deploy_services:-none}"

  build-java:
    name: Build Java Service
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.has-java == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.java-services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          version: '25.1'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Info
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java --version
          native-image --version

      - name: Run tests
        run: ./gradlew :${{ matrix.service }}:test

      - name: Build and publish image
        run: ./gradlew :${{ matrix.service }}:bootBuildImage
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PWD: ${{ secrets.DOCKERHUB_PWD }}

  build-rust:
    name: Build Rust Service
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.has-rust == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.rust-services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --release -p ${{ matrix.service }}

      - name: Build Docker image
        run: docker build -t mingchiuli/megalith-${{ matrix.service }}:latest -f ${{ matrix.service }}/Dockerfile .

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PWD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push mingchiuli/megalith-${{ matrix.service }}:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-java
      - build-rust
    if: ${{ always() && needs.changes.outputs.has-services == 'true' && needs.build-java.result != 'failure' && needs.build-rust.result != 'failure' && needs.build-java.result != 'cancelled' && needs.build-rust.result != 'cancelled' }}
    concurrency:
      group: megalith-production-deploy
      cancel-in-progress: false
    steps:
      - name: Connect to WireGuard
        shell: bash
        env:
          WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes wireguard-tools
          sudo install -d -m 700 /etc/wireguard
          printf '%s\n' "$WIREGUARD_CONFIG" | sudo tee /etc/wireguard/wg0.conf >/dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Deploy changed services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            services="${{ needs.changes.outputs.deploy-services }}"

            compose() {
              service="$1"
              shift
              if [ "$service" = "micro-gateway-rs" ]; then
                docker compose -f docker-compose.infrastructure.yml "$@"
              else
                docker compose "$@"
              fi
            }

            deploy_service() {
              service="$1"
              image="mingchiuli/megalith-${service}:latest"

              echo "Deploying ${service}"
              docker pull "$image"
              compose "$service" rm -sf "$service"
              compose "$service" up -d --no-deps --force-recreate "$service"

              container_id=$(compose "$service" ps -q "$service")
              if [ -z "$container_id" ]; then
                compose "$service" ps "$service"
                exit 1
              fi

              for attempt in $(seq 1 60); do
                health_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
                if [ "$health_status" = "healthy" ]; then
                  break
                fi
                if [ "$health_status" = "unhealthy" ] || [ "$attempt" -eq 60 ]; then
                  compose "$service" ps "$service"
                  docker logs --tail=200 "$container_id"
                  exit 1
                fi
                sleep 2
              done

              old=$(docker images | grep -w "$service" | grep 'none' | awk '{print $3}' || true)
              if [ -n "$old" ]; then
                docker rmi $old || true
              fi

              if [ "$service" = "micro-gateway-rs" ]; then
                nginx=$(docker ps | grep -w 'nginx' | awk '{print $1}' || true)
                if [ -n "$nginx" ]; then
                  docker exec "$nginx" nginx -s reload
                fi
              fi
            }

            for service in $services; do
              deploy_service "$service"
            done

      - name: Disconnect WireGuard
        if: ${{ always() }}
        run: |
          sudo wg-quick down wg0 || true
          sudo rm -f /etc/wireguard/wg0.conf
