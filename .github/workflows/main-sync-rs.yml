name: Axum build Share-Rs
on:
  push:
    branches:
      - 'main'
    paths:
      - 'micro-sync-rs/**'
      - '.github/workflows/main-sync-rs.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl
      - name: Run tests
        run: cargo test --release

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
          
      - name: Build Docker image
        run: docker build -t mingchiuli/megalith-micro-sync-rs:latest -f micro-sync-rs/Dockerfile .

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_PWD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push mingchiuli/megalith-micro-sync-rs
  
  deploy:
    name: Deploy
    concurrency:
      group: megalith-production-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            docker pull mingchiuli/megalith-micro-sync-rs:latest
            docker compose rm -sf micro-sync-rs
            docker compose up -d --no-deps --force-recreate micro-sync-rs
            container_id=$(docker compose ps -q micro-sync-rs)
            if [ -z "$container_id" ]; then
              docker compose ps micro-sync-rs
              exit 1
            fi
            for attempt in $(seq 1 60); do
              health_status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
              if [ "$health_status" = "healthy" ]; then
                break
              fi
              if [ "$health_status" = "unhealthy" ] || [ "$attempt" -eq 60 ]; then
                docker compose ps micro-sync-rs
                docker logs --tail=200 "$container_id"
                exit 1
              fi
              sleep 2
            done
            old=$(docker images | grep -w 'micro-sync-rs' | grep 'none' | awk '{print $3}')
            if [ -n "$old" ]; then
              docker rmi $old || true
            fi
